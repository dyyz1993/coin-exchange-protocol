<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金币交易协议 - 管理系统</title>
  <meta name="description" content="金币交易协议管理界面 - 账户管理与冻结管理">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    code {
      font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
        monospace;
    }
    
    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- 应用脚本 -->
  <script type="text/babel" data-type="module">
    // 从组件文件导入（需要构建工具支持）
    // 这里我们内联组件代码以简化演示
    
    const { useState, useEffect } = React;
    
    // ==================== 类型定义 ====================
    
    // ==================== AccountManager 组件 ====================
    const AccountManager = () => {
      const [accounts, setAccounts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [showTransferForm, setShowTransferForm] = useState(false);
      const [transferData, setTransferData] = useState({
        fromAddress: '',
        toAddress: '',
        amount: 0,
        memo: ''
      });

      const API_BASE = 'http://localhost:3000/api';

      useEffect(() => {
        fetchAccounts();
      }, []);

      const fetchAccounts = async () => {
        try {
          setLoading(true);
          const response = await fetch(`${API_BASE}/accounts`);
          const result = await response.json();
          
          if (result.success && result.data) {
            setAccounts(result.data);
            setError(null);
          } else {
            // 演示数据
            setAccounts([
              {
                id: '1',
                address: '0x1234567890abcdef1234567890abcdef12345678',
                balance: 10000.50,
                frozenAmount: 500.00,
                status: 'active',
                createdAt: new Date().toISOString()
              },
              {
                id: '2',
                address: '0xabcdef1234567890abcdef1234567890abcdef12',
                balance: 5000.00,
                frozenAmount: 0,
                status: 'active',
                createdAt: new Date().toISOString()
              }
            ]);
            setError(null);
          }
        } catch (err) {
          // 使用演示数据
          setAccounts([
            {
              id: '1',
              address: '0x1234567890abcdef1234567890abcdef12345678',
              balance: 10000.50,
              frozenAmount: 500.00,
              status: 'active',
              createdAt: new Date().toISOString()
            },
            {
              id: '2',
              address: '0xabcdef1234567890abcdef1234567890abcdef12',
              balance: 5000.00,
              frozenAmount: 0,
              status: 'active',
              createdAt: new Date().toISOString()
            }
          ]);
          setError('后端服务未启动，显示演示数据');
        } finally {
          setLoading(false);
        }
      };

      const handleTransfer = async (e) => {
        e.preventDefault();
        alert('转账功能需要后端 API 支持');
      };

      const formatBalance = (balance) => {
        return balance.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
      };

      const getStatusBadge = (status) => {
        const styles = {
          active: 'bg-green-100 text-green-800',
          frozen: 'bg-blue-100 text-blue-800',
          inactive: 'bg-gray-100 text-gray-800'
        };
        const labels = {
          active: '正常',
          frozen: '已冻结',
          inactive: '未激活'
        };
        return (
          <span className={`px-2 py-1 rounded-full text-xs font-medium ${styles[status]}`}>
            {labels[status]}
          </span>
        );
      };

      return (
        <div className="bg-white rounded-lg shadow-lg p-6">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-bold text-gray-800">账户管理</h2>
            <div className="space-x-2">
              <button
                onClick={fetchAccounts}
                className="px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
              >
                刷新
              </button>
              <button
                onClick={() => setShowTransferForm(!showTransferForm)}
                className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition"
              >
                {showTransferForm ? '取消' : '转账'}
              </button>
            </div>
          </div>

          {error && (
            <div className="mb-4 p-4 bg-yellow-50 border border-yellow-200 rounded text-yellow-700">
              {error}
            </div>
          )}

          {showTransferForm && (
            <form onSubmit={handleTransfer} className="mb-6 p-4 bg-gray-50 rounded-lg">
              <h3 className="text-lg font-semibold mb-4">转账表单</h3>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">转出地址</label>
                  <input
                    type="text"
                    value={transferData.fromAddress}
                    onChange={(e) => setTransferData({...transferData, fromAddress: e.target.value})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">转入地址</label>
                  <input
                    type="text"
                    value={transferData.toAddress}
                    onChange={(e) => setTransferData({...transferData, toAddress: e.target.value})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">转账金额</label>
                  <input
                    type="number"
                    value={transferData.amount}
                    onChange={(e) => setTransferData({...transferData, amount: Number(e.target.value)})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    min="0"
                    step="0.01"
                    required
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">备注</label>
                  <input
                    type="text"
                    value={transferData.memo}
                    onChange={(e) => setTransferData({...transferData, memo: e.target.value})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                </div>
              </div>
              <button
                type="submit"
                className="mt-4 px-6 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition"
              >
                确认转账
              </button>
            </form>
          )}

          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">账户地址</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">可用余额</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">冻结金额</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {accounts.map((account) => (
                  <tr key={account.id} className="hover:bg-gray-50">
                    <td className="px-4 py-4 whitespace-nowrap">
                      <span className="font-mono text-sm text-gray-900">
                        {account.address.substring(0, 10)}...{account.address.substring(account.address.length - 8)}
                      </span>
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      <span className="text-sm font-medium text-gray-900">
                        {formatBalance(account.balance)} 🪙
                      </span>
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      <span className="text-sm text-gray-500">
                        {formatBalance(account.frozenAmount)} 🪙
                      </span>
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      {getStatusBadge(account.status)}
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-500">
                      {new Date(account.createdAt).toLocaleString('zh-CN')}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {accounts.length > 0 && (
            <div className="mt-6 pt-6 border-t border-gray-200">
              <div className="grid grid-cols-3 gap-4 text-center">
                <div>
                  <p className="text-sm text-gray-500">总账户数</p>
                  <p className="text-2xl font-bold text-gray-900">{accounts.length}</p>
                </div>
                <div>
                  <p className="text-sm text-gray-500">总余额</p>
                  <p className="text-2xl font-bold text-gray-900">
                    {formatBalance(accounts.reduce((sum, acc) => sum + acc.balance, 0))} 🪙
                  </p>
                </div>
                <div>
                  <p className="text-sm text-gray-500">冻结总额</p>
                  <p className="text-2xl font-bold text-gray-900">
                    {formatBalance(accounts.reduce((sum, acc) => sum + acc.frozenAmount, 0))} 🪙
                  </p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==================== FreezeManager 组件 ====================
    const FreezeManager = () => {
      const [freezeRecords, setFreezeRecords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [showFreezeForm, setShowFreezeForm] = useState(false);
      const [activeTab, setActiveTab] = useState('list');
      const [freezeData, setFreezeData] = useState({
        accountAddress: '',
        freezeType: 'initial',
        amount: 0,
        reason: '',
        duration: 30
      });

      const API_BASE = 'http://localhost:3000/api';

      useEffect(() => {
        fetchFreezeRecords();
      }, []);

      const fetchFreezeRecords = async () => {
        try {
          setLoading(true);
          const response = await fetch(`${API_BASE}/freeze/records`);
          const result = await response.json();
          
          if (result.success && result.data) {
            setFreezeRecords(result.data);
            setError(null);
          } else {
            // 演示数据
            setFreezeRecords([
              {
                id: '1',
                accountId: '1',
                accountAddress: '0x1234567890abcdef1234567890abcdef12345678',
                freezeType: 'initial',
                amount: 500.00,
                reason: '初始账户验证冻结',
                status: 'active',
                createdAt: new Date().toISOString()
              },
              {
                id: '2',
                accountId: '2',
                accountAddress: '0xabcdef1234567890abcdef1234567890abcdef12',
                freezeType: 'dispute',
                amount: 1000.00,
                reason: '交易争议待处理',
                status: 'pending',
                createdAt: new Date().toISOString()
              }
            ]);
            setError(null);
          }
        } catch (err) {
          // 使用演示数据
          setFreezeRecords([
            {
              id: '1',
              accountId: '1',
              accountAddress: '0x1234567890abcdef1234567890abcdef12345678',
              freezeType: 'initial',
              amount: 500.00,
              reason: '初始账户验证冻结',
              status: 'active',
              createdAt: new Date().toISOString()
            },
            {
              id: '2',
              accountId: '2',
              accountAddress: '0xabcdef1234567890abcdef1234567890abcdef12',
              freezeType: 'dispute',
              amount: 1000.00,
              reason: '交易争议待处理',
              status: 'pending',
              createdAt: new Date().toISOString()
            }
          ]);
          setError('后端服务未启动，显示演示数据');
        } finally {
          setLoading(false);
        }
      };

      const handleFreeze = async (e) => {
        e.preventDefault();
        alert('冻结功能需要后端 API 支持');
      };

      const handleUnfreeze = async (recordId) => {
        if (!confirm('确认要解冻该账户吗？')) return;
        alert('解冻功能需要后端 API 支持');
      };

      const formatAmount = (amount) => {
        return amount.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
      };

      const getFreezeTypeBadge = (type) => {
        const styles = {
          initial: 'bg-yellow-100 text-yellow-800',
          dispute: 'bg-orange-100 text-orange-800',
          full_account: 'bg-red-100 text-red-800'
        };
        const labels = {
          initial: '初始冻结',
          dispute: '争议冻结',
          full_account: '完全冻结'
        };
        return (
          <span className={`px-2 py-1 rounded-full text-xs font-medium ${styles[type]}`}>
            {labels[type]}
          </span>
        );
      };

      const getStatusBadge = (status) => {
        const styles = {
          pending: 'bg-gray-100 text-gray-800',
          active: 'bg-blue-100 text-blue-800',
          released: 'bg-green-100 text-green-800',
          expired: 'bg-gray-100 text-gray-500'
        };
        const labels = {
          pending: '待审核',
          active: '生效中',
          released: '已解冻',
          expired: '已过期'
        };
        return (
          <span className={`px-2 py-1 rounded-full text-xs font-medium ${styles[status]}`}>
            {labels[status]}
          </span>
        );
      };

      const pendingRecords = freezeRecords.filter(r => r.status === 'pending');
      const activeRecords = freezeRecords.filter(r => r.status === 'active');
      const displayRecords = activeTab === 'pending' ? pendingRecords : freezeRecords;

      return (
        <div className="bg-white rounded-lg shadow-lg p-6">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-bold text-gray-800">冻结管理</h2>
            <div className="space-x-2">
              <button
                onClick={fetchFreezeRecords}
                className="px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
              >
                刷新
              </button>
              <button
                onClick={() => setShowFreezeForm(!showFreezeForm)}
                className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition"
              >
                {showFreezeForm ? '取消' : '申请冻结'}
              </button>
            </div>
          </div>

          {error && (
            <div className="mb-4 p-4 bg-yellow-50 border border-yellow-200 rounded text-yellow-700">
              {error}
            </div>
          )}

          <div className="flex space-x-4 mb-6 border-b border-gray-200">
            <button
              onClick={() => setActiveTab('list')}
              className={`pb-2 px-1 ${
                activeTab === 'list'
                  ? 'border-b-2 border-blue-500 text-blue-600 font-medium'
                  : 'text-gray-500 hover:text-gray-700'
              }`}
            >
              全部记录 ({freezeRecords.length})
            </button>
            <button
              onClick={() => setActiveTab('pending')}
              className={`pb-2 px-1 ${
                activeTab === 'pending'
                  ? 'border-b-2 border-blue-500 text-blue-600 font-medium'
                  : 'text-gray-500 hover:text-gray-700'
              }`}
            >
              待审核 ({pendingRecords.length})
            </button>
          </div>

          {showFreezeForm && (
            <form onSubmit={handleFreeze} className="mb-6 p-4 bg-gray-50 rounded-lg">
              <h3 className="text-lg font-semibold mb-4">冻结申请表单</h3>
              <div className="grid grid-cols-2 gap-4">
                <div className="col-span-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1">账户地址</label>
                  <input
                    type="text"
                    value={freezeData.accountAddress}
                    onChange={(e) => setFreezeData({...freezeData, accountAddress: e.target.value})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">冻结类型</label>
                  <select
                    value={freezeData.freezeType}
                    onChange={(e) => setFreezeData({...freezeData, freezeType: e.target.value})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="initial">初始冻结</option>
                    <option value="dispute">争议冻结</option>
                    <option value="full_account">完全冻结</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">冻结金额</label>
                  <input
                    type="number"
                    value={freezeData.amount}
                    onChange={(e) => setFreezeData({...freezeData, amount: Number(e.target.value)})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    min="0"
                    step="0.01"
                    required
                  />
                </div>
                <div className="col-span-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1">冻结原因</label>
                  <textarea
                    value={freezeData.reason}
                    onChange={(e) => setFreezeData({...freezeData, reason: e.target.value})}
                    className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows={3}
                    required
                  />
                </div>
              </div>
              <button
                type="submit"
                className="mt-4 px-6 py-2 bg-orange-500 text-white rounded hover:bg-orange-600 transition"
              >
                提交申请
              </button>
            </form>
          )}

          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">账户地址</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">冻结类型</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">冻结金额</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                  <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {displayRecords.map((record) => (
                  <tr key={record.id} className="hover:bg-gray-50">
                    <td className="px-4 py-4 whitespace-nowrap">
                      <span className="font-mono text-sm text-gray-900">
                        {record.accountAddress.substring(0, 10)}...{record.accountAddress.substring(record.accountAddress.length - 8)}
                      </span>
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      {getFreezeTypeBadge(record.freezeType)}
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      <span className="text-sm font-medium text-gray-900">
                        {formatAmount(record.amount)} 🪙
                      </span>
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      {getStatusBadge(record.status)}
                    </td>
                    <td className="px-4 py-4 whitespace-nowrap">
                      {record.status === 'active' && (
                        <button
                          onClick={() => handleUnfreeze(record.id)}
                          className="px-3 py-1 bg-green-500 text-white text-sm rounded hover:bg-green-600 transition"
                        >
                          解冻
                        </button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {freezeRecords.length > 0 && (
            <div className="mt-6 pt-6 border-t border-gray-200">
              <div className="grid grid-cols-4 gap-4 text-center">
                <div>
                  <p className="text-sm text-gray-500">总记录数</p>
                  <p className="text-2xl font-bold text-gray-900">{freezeRecords.length}</p>
                </div>
                <div>
                  <p className="text-sm text-gray-500">待审核</p>
                  <p className="text-2xl font-bold text-orange-600">{pendingRecords.length}</p>
                </div>
                <div>
                  <p className="text-sm text-gray-500">生效中</p>
                  <p className="text-2xl font-bold text-blue-600">{activeRecords.length}</p>
                </div>
                <div>
                  <p className="text-sm text-gray-500">冻结总额</p>
                  <p className="text-2xl font-bold text-gray-900">
                    {formatAmount(activeRecords.reduce((sum, r) => sum + r.amount, 0))} 🪙
                  </p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==================== 主应用 ====================
    const App = () => {
      const [activeTab, setActiveTab] = useState('accounts');

      return (
        <div className="min-h-screen bg-gray-100">
          {/* 顶部导航栏 */}
          <nav className="bg-white shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16">
                <div className="flex items-center">
                  <div className="flex-shrink-0 flex items-center">
                    <span className="text-3xl">🪙</span>
                    <h1 className="ml-3 text-xl font-bold text-gray-900">
                      金币交易协议
                    </h1>
                  </div>
                </div>
                
                {/* 主导航 */}
                <div className="flex space-x-4">
                  <button
                    onClick={() => setActiveTab('accounts')}
                    className={`px-4 py-2 rounded-md text-sm font-medium transition ${
                      activeTab === 'accounts'
                        ? 'bg-blue-100 text-blue-700'
                        : 'text-gray-700 hover:bg-gray-100'
                    }`}
                  >
                    📊 账户管理
                  </button>
                  <button
                    onClick={() => setActiveTab('freeze')}
                    className={`px-4 py-2 rounded-md text-sm font-medium transition ${
                      activeTab === 'freeze'
                        ? 'bg-blue-100 text-blue-700'
                        : 'text-gray-700 hover:bg-gray-100'
                    }`}
                  >
                    ❄️ 冻结管理
                  </button>
                </div>

                {/* 用户信息 */}
                <div className="flex items-center">
                  <div className="flex items-center space-x-2">
                    <div className="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
